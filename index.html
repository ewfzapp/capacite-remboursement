<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>Capacité de Remboursement - Service Express</title></head>
<body style="background:#020617; color:#fff; font-family:sans-serif; text-align:center; padding:50px;">
  <a href="https://service-express.org" style="color:#94a3b8; text-decoration:none;">← Retour au portail</a>
  <h1>🏦 Capacité de <span>Remboursement</span></h1>
  <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:20px; max-width:400px; margin:20px auto;">
    <label>Capital emprunté (€)</label><br>
    <input type="number" id="capital" value="200000" oninput="calc()" style="padding:10px; width:100%; border-radius:10px; border:none; margin-top:10px;"><br><br>
    <div id="res" style="font-size:24px; color:#34d399;">— € / mois</div>
  </div>
  <script>function calc(){ let c=document.getElementById('capital').value; document.getElementById('res').textContent = Math.round(c*0.0055) + ' €/mois (est.)'; }</script>
</body></html>
